name: Java Linter Check

on: push

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Get Code
      uses: actions/checkout@v4

    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build Project
      run: mvn clean install

    - name: Run Checkstyle
      run: mvn checkstyle:check || echo "Checkstyle Completed"
